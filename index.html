<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影收藏与评分管理系统</title>
    <style>
        /* ========== CSS 变量定义 ========== */
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #475569;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ========== 头部样式 ========== */
        header {
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* ========== 统计信息 ========== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .stat-card .number {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-card .label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* ========== 工具栏 ========== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-group select {
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-group select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* ========== 电影卡片网格 ========== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.2);
            border-color: var(--primary-color);
        }

        .movie-card-header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .movie-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--primary-color);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .movie-year {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .movie-card-body {
            padding: 1.25rem;
        }

        .movie-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .movie-director {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            color: var(--warning-color);
            font-size: 1rem;
        }

        .star.empty {
            color: var(--border-color);
        }

        .rating-value {
            font-weight: 600;
            color: var(--warning-color);
        }

        .movie-desc {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .movie-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-watched {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success-color);
        }

        .status-unwatched {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }

        .movie-card-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .movie-card-footer .btn {
            flex: 1;
            justify-content: center;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            padding: 1rem;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: var(--transition);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.25rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .rating-input {
            display: flex;
            gap: 0.25rem;
        }

        .rating-input .star-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--border-color);
            transition: var(--transition);
            padding: 0;
        }

        .rating-input .star-btn:hover,
        .rating-input .star-btn.active {
            color: var(--warning-color);
            transform: scale(1.1);
        }

        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .empty-state p {
            margin-bottom: 1.5rem;
        }

        /* ========== 确认对话框 ========== */
        .confirm-dialog {
            text-align: center;
            padding: 1rem 0;
        }

        .confirm-dialog .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .confirm-dialog h3 {
            margin-bottom: 0.5rem;
        }

        .confirm-dialog p {
            color: var(--text-secondary);
        }

        /* ========== Toast 提示 ========== */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            color: white;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.success {
            background: var(--success-color);
        }

        .toast.error {
            background: var(--danger-color);
        }

        .toast.info {
            background: var(--primary-color);
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5rem;
            }

            .toolbar {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .filter-group {
                width: 100%;
            }

            .filter-group select {
                flex: 1;
            }

            .btn-primary {
                width: 100%;
                justify-content: center;
            }

            .movie-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .modal {
                max-height: 100vh;
                border-radius: 0;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }

            .movie-card-footer {
                flex-wrap: wrap;
            }

            .movie-card-footer .btn {
                flex: none;
                width: calc(50% - 0.25rem);
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header>
        <h1>🎬 电影收藏与评分管理系统</h1>
        <p>记录你喜爱的每一部电影</p>
    </header>

    <!-- 主容器 -->
    <div class="container">
        <!-- 统计信息 -->
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">0</div>
                <div class="label">收藏总数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="watchedCount">0</div>
                <div class="label">已观看</div>
            </div>
            <div class="stat-card">
                <div class="number" id="unwatchedCount">0</div>
                <div class="label">未观看</div>
            </div>
            <div class="stat-card">
                <div class="number" id="avgRating">0</div>
                <div class="label">平均评分</div>
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索电影名称...">
            </div>
            <div class="filter-group">
                <select id="filterType">
                    <option value="">全部类型</option>
                    <option value="动作">动作</option>
                    <option value="喜剧">喜剧</option>
                    <option value="科幻">科幻</option>
                    <option value="爱情">爱情</option>
                    <option value="悬疑">悬疑</option>
                    <option value="恐怖">恐怖</option>
                    <option value="动画">动画</option>
                    <option value="纪录片">纪录片</option>
                    <option value="剧情">剧情</option>
                    <option value="奇幻">奇幻</option>
                </select>
                <select id="filterYear">
                    <option value="">全部年份</option>
                </select>
                <select id="filterStatus">
                    <option value="">全部状态</option>
                    <option value="watched">已观看</option>
                    <option value="unwatched">未观看</option>
                </select>
            </div>
            <button class="btn btn-primary" id="addMovieBtn">
                <span>➕</span> 添加电影
            </button>
        </div>

        <!-- 电影列表 -->
        <div class="movie-grid" id="movieGrid">
            <!-- 电影卡片将通过 JavaScript 动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="icon">🎬</div>
            <h3>还没有收藏任何电影</h3>
            <p>点击"添加电影"按钮开始记录你喜爱的电影吧！</p>
            <button class="btn btn-primary" id="addFirstMovieBtn">
                <span>➕</span> 添加第一部电影
            </button>
        </div>
    </div>

    <!-- 添加/编辑电影模态框 -->
    <div class="modal-overlay" id="movieModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加电影</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="movieForm">
                    <input type="hidden" id="movieId">
                    <div class="form-group">
                        <label for="movieName">电影名称 *</label>
                        <input type="text" id="movieName" required placeholder="请输入电影名称">
                    </div>
                    <div class="form-group">
                        <label for="movieDirector">导演</label>
                        <input type="text" id="movieDirector" placeholder="请输入导演名称">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="movieType">类型 *</label>
                            <select id="movieType" required>
                                <option value="">请选择类型</option>
                                <option value="动作">动作</option>
                                <option value="喜剧">喜剧</option>
                                <option value="科幻">科幻</option>
                                <option value="爱情">爱情</option>
                                <option value="悬疑">悬疑</option>
                                <option value="恐怖">恐怖</option>
                                <option value="动画">动画</option>
                                <option value="纪录片">纪录片</option>
                                <option value="剧情">剧情</option>
                                <option value="奇幻">奇幻</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="movieYear">上映年份 *</label>
                            <select id="movieYear" required>
                                <!-- 年份选项将通过 JavaScript 生成 -->
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>个人评分</label>
                        <div class="rating-input" id="ratingInput">
                            <button type="button" class="star-btn" data-rating="1">★</button>
                            <button type="button" class="star-btn" data-rating="2">★</button>
                            <button type="button" class="star-btn" data-rating="3">★</button>
                            <button type="button" class="star-btn" data-rating="4">★</button>
                            <button type="button" class="star-btn" data-rating="5">★</button>
                        </div>
                        <input type="hidden" id="movieRating" value="0">
                    </div>
                    <div class="form-group">
                        <label for="movieDesc">简介</label>
                        <textarea id="movieDesc" placeholder="请输入电影简介..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">取消</button>
                <button class="btn btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-body">
                <div class="confirm-dialog">
                    <div class="icon">⚠️</div>
                    <h3>确认删除</h3>
                    <p>确定要删除这部电影吗？此操作无法撤销。</p>
                </div>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-secondary" id="cancelDelete">取消</button>
                <button class="btn btn-danger" id="confirmDelete">删除</button>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        /* ========== 数据管理模块 ========== */
        const MovieManager = {
            STORAGE_KEY: 'movieCollection',

            getMovies() {
                const data = localStorage.getItem(this.STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            },

            saveMovies(movies) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(movies));
            },

            addMovie(movie) {
                const movies = this.getMovies();
                movie.id = Date.now().toString();
                movie.watched = false;
                movie.createdAt = new Date().toISOString();
                movies.push(movie);
                this.saveMovies(movies);
                return movie;
            },

            updateMovie(id, updates) {
                const movies = this.getMovies();
                const index = movies.findIndex(m => m.id === id);
                if (index !== -1) {
                    movies[index] = { ...movies[index], ...updates };
                    this.saveMovies(movies);
                    return movies[index];
                }
                return null;
            },

            deleteMovie(id) {
                const movies = this.getMovies();
                const filtered = movies.filter(m => m.id !== id);
                this.saveMovies(filtered);
            },

            toggleWatched(id) {
                const movies = this.getMovies();
                const movie = movies.find(m => m.id === id);
                if (movie) {
                    movie.watched = !movie.watched;
                    this.saveMovies(movies);
                    return movie;
                }
                return null;
            },

            getStats() {
                const movies = this.getMovies();
                const total = movies.length;
                const watched = movies.filter(m => m.watched).length;
                const unwatched = total - watched;
                const avgRating = total > 0 
                    ? (movies.reduce((sum, m) => sum + (m.rating || 0), 0) / total).toFixed(1)
                    : 0;
                return { total, watched, unwatched, avgRating };
            },

            filterMovies(filters) {
                let movies = this.getMovies();
                
                if (filters.search) {
                    const search = filters.search.toLowerCase();
                    movies = movies.filter(m => 
                        m.name.toLowerCase().includes(search)
                    );
                }
                
                if (filters.type) {
                    movies = movies.filter(m => m.type === filters.type);
                }
                
                if (filters.year) {
                    movies = movies.filter(m => m.year === filters.year);
                }
                
                if (filters.status) {
                    const isWatched = filters.status === 'watched';
                    movies = movies.filter(m => m.watched === isWatched);
                }
                
                return movies;
            },

            getAvailableYears() {
                const movies = this.getMovies();
                const years = [...new Set(movies.map(m => m.year))].sort((a, b) => b - a);
                return years;
            }
        };

        /* ========== UI 渲染模块 ========== */
        const UI = {
            currentEditId: null,
            deleteTargetId: null,

            init() {
                this.bindEvents();
                this.initYearOptions();
                this.render();
            },

            bindEvents() {
                document.getElementById('addMovieBtn').addEventListener('click', () => this.openModal());
                document.getElementById('addFirstMovieBtn').addEventListener('click', () => this.openModal());
                document.getElementById('closeModal').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('saveBtn').addEventListener('click', () => this.saveMovie());
                document.getElementById('cancelDelete').addEventListener('click', () => this.closeDeleteModal());
                document.getElementById('confirmDelete').addEventListener('click', () => this.confirmDelete());

                document.getElementById('movieModal').addEventListener('click', (e) => {
                    if (e.target.id === 'movieModal') this.closeModal();
                });
                document.getElementById('deleteModal').addEventListener('click', (e) => {
                    if (e.target.id === 'deleteModal') this.closeDeleteModal();
                });

                document.querySelectorAll('.rating-input .star-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const rating = parseInt(btn.dataset.rating);
                        this.setRating(rating);
                    });
                });

                document.getElementById('searchInput').addEventListener('input', () => this.render());
                document.getElementById('filterType').addEventListener('change', () => this.render());
                document.getElementById('filterYear').addEventListener('change', () => this.render());
                document.getElementById('filterStatus').addEventListener('change', () => this.render());
            },

            initYearOptions() {
                const yearSelect = document.getElementById('movieYear');
                const currentYear = new Date().getFullYear();
                for (let year = currentYear; year >= 1900; year--) {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = year;
                    yearSelect.appendChild(option);
                }
            },

            updateYearFilter() {
                const filterYear = document.getElementById('filterYear');
                const currentValue = filterYear.value;
                const years = MovieManager.getAvailableYears();
                
                filterYear.innerHTML = '<option value="">全部年份</option>';
                years.forEach(year => {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = year + '年';
                    filterYear.appendChild(option);
                });
                
                if (years.includes(currentValue)) {
                    filterYear.value = currentValue;
                }
            },

            getFilters() {
                return {
                    search: document.getElementById('searchInput').value,
                    type: document.getElementById('filterType').value,
                    year: document.getElementById('filterYear').value,
                    status: document.getElementById('filterStatus').value
                };
            },

            render() {
                const filters = this.getFilters();
                const movies = MovieManager.filterMovies(filters);
                const stats = MovieManager.getStats();

                document.getElementById('totalCount').textContent = stats.total;
                document.getElementById('watchedCount').textContent = stats.watched;
                document.getElementById('unwatchedCount').textContent = stats.unwatched;
                document.getElementById('avgRating').textContent = stats.avgRating;

                this.updateYearFilter();

                const grid = document.getElementById('movieGrid');
                const emptyState = document.getElementById('emptyState');

                if (movies.length === 0) {
                    grid.style.display = 'none';
                    emptyState.style.display = 'block';
                    if (MovieManager.getMovies().length === 0) {
                        emptyState.querySelector('h3').textContent = '还没有收藏任何电影';
                        emptyState.querySelector('p').textContent = '点击"添加电影"按钮开始记录你喜爱的电影吧！';
                    } else {
                        emptyState.querySelector('h3').textContent = '没有找到匹配的电影';
                        emptyState.querySelector('p').textContent = '尝试调整筛选条件';
                        emptyState.querySelector('button').style.display = 'none';
                    }
                } else {
                    grid.style.display = 'grid';
                    emptyState.style.display = 'none';
                    grid.innerHTML = movies.map(movie => this.createMovieCard(movie)).join('');
                    this.bindCardEvents();
                }
            },

            createMovieCard(movie) {
                const stars = this.createStars(movie.rating || 0);
                const statusClass = movie.watched ? 'status-watched' : 'status-unwatched';
                const statusText = movie.watched ? '✓ 已观看' : '○ 未观看';

                return `
                    <div class="movie-card" data-id="${movie.id}">
                        <div class="movie-card-header">
                            <span class="movie-type">${movie.type}</span>
                            <span class="movie-year">${movie.year}年</span>
                        </div>
                        <div class="movie-card-body">
                            <h3 class="movie-title">${this.escapeHtml(movie.name)}</h3>
                            <p class="movie-director">导演：${movie.director ? this.escapeHtml(movie.director) : '未知'}</p>
                            <div class="movie-rating">
                                <div class="stars">${stars}</div>
                                <span class="rating-value">${movie.rating || 0}/5</span>
                            </div>
                            <p class="movie-desc">${movie.desc ? this.escapeHtml(movie.desc) : '暂无简介'}</p>
                            <span class="movie-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="movie-card-footer">
                            <button class="btn btn-secondary btn-sm" data-action="toggle" data-id="${movie.id}">
                                ${movie.watched ? '标记未看' : '标记已看'}
                            </button>
                            <button class="btn btn-secondary btn-sm" data-action="edit" data-id="${movie.id}">编辑</button>
                            <button class="btn btn-danger btn-sm" data-action="delete" data-id="${movie.id}">删除</button>
                        </div>
                    </div>
                `;
            },

            createStars(rating) {
                let html = '';
                for (let i = 1; i <= 5; i++) {
                    html += `<span class="star ${i <= rating ? '' : 'empty'}">★</span>`;
                }
                return html;
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            bindCardEvents() {
                document.querySelectorAll('.movie-card-footer button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const action = btn.dataset.action;
                        const id = btn.dataset.id;
                        
                        if (action === 'toggle') {
                            MovieManager.toggleWatched(id);
                            this.render();
                            this.showToast('状态已更新', 'success');
                        } else if (action === 'edit') {
                            this.openModal(id);
                        } else if (action === 'delete') {
                            this.openDeleteModal(id);
                        }
                    });
                });
            },

            openModal(id = null) {
                this.currentEditId = id;
                const modal = document.getElementById('movieModal');
                const title = document.getElementById('modalTitle');
                const form = document.getElementById('movieForm');

                form.reset();
                this.setRating(0);

                if (id) {
                    title.textContent = '编辑电影';
                    const movies = MovieManager.getMovies();
                    const movie = movies.find(m => m.id === id);
                    if (movie) {
                        document.getElementById('movieId').value = movie.id;
                        document.getElementById('movieName').value = movie.name;
                        document.getElementById('movieDirector').value = movie.director || '';
                        document.getElementById('movieType').value = movie.type;
                        document.getElementById('movieYear').value = movie.year;
                        document.getElementById('movieDesc').value = movie.desc || '';
                        this.setRating(movie.rating || 0);
                    }
                } else {
                    title.textContent = '添加电影';
                    document.getElementById('movieId').value = '';
                }

                modal.classList.add('active');
            },

            closeModal() {
                document.getElementById('movieModal').classList.remove('active');
                this.currentEditId = null;
            },

            setRating(rating) {
                document.getElementById('movieRating').value = rating;
                document.querySelectorAll('.rating-input .star-btn').forEach((btn, index) => {
                    if (index < rating) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            },

            saveMovie() {
                const name = document.getElementById('movieName').value.trim();
                const type = document.getElementById('movieType').value;
                const year = document.getElementById('movieYear').value;

                if (!name || !type || !year) {
                    this.showToast('请填写必填项', 'error');
                    return;
                }

                const movieData = {
                    name,
                    director: document.getElementById('movieDirector').value.trim(),
                    type,
                    year,
                    rating: parseInt(document.getElementById('movieRating').value) || 0,
                    desc: document.getElementById('movieDesc').value.trim()
                };

                if (this.currentEditId) {
                    MovieManager.updateMovie(this.currentEditId, movieData);
                    this.showToast('电影信息已更新', 'success');
                } else {
                    MovieManager.addMovie(movieData);
                    this.showToast('电影添加成功', 'success');
                }

                this.closeModal();
                this.render();
            },

            openDeleteModal(id) {
                this.deleteTargetId = id;
                document.getElementById('deleteModal').classList.add('active');
            },

            closeDeleteModal() {
                document.getElementById('deleteModal').classList.remove('active');
                this.deleteTargetId = null;
            },

            confirmDelete() {
                if (this.deleteTargetId) {
                    MovieManager.deleteMovie(this.deleteTargetId);
                    this.showToast('电影已删除', 'success');
                    this.closeDeleteModal();
                    this.render();
                }
            },

            showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        /* ========== 初始化应用 ========== */
        document.addEventListener('DOMContentLoaded', () => {
            UI.init();
        });
    </script>
</body>
</html>
